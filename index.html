<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>港式台灣麻雀</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100vh;height:100dvh;overflow:hidden;font-family:'Noto Sans TC',sans-serif;background:#14505e;color:#f0ead0;user-select:none;-webkit-user-select:none;position:fixed;top:0;left:0;right:0;bottom:0}
#app{width:100%;height:100%;overflow:hidden}

/* Tiles */
.t{display:inline-block;vertical-align:bottom;cursor:pointer;flex-shrink:0;border-radius:4px;overflow:hidden;transition:transform .1s}
.t canvas{width:100%;height:100%;display:block}
.t-lg{width:46px;height:64px;border:2px solid #b0a070;border-radius:5px;box-shadow:2px 3px 5px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.6)}
.t-md{width:32px;height:44px;border:1.5px solid #b0a070;border-radius:4px;box-shadow:1px 2px 3px rgba(0,0,0,.3)}
.t-sm{width:24px;height:33px;border:1px solid #b0a070;border-radius:3px;box-shadow:1px 1px 2px rgba(0,0,0,.2)}
.t-xs{width:14px;height:20px;border:1px solid #5ab0d0;border-radius:2px}
.t-back{background:linear-gradient(160deg,#4a9abd,#3580a0);border-color:#5ab0d0;cursor:default}
.t.sel{transform:translateY(-14px);box-shadow:0 8px 18px rgba(255,215,0,.5);border-color:#ffd700;z-index:10}
.t.drawn{border-color:#50cc50;box-shadow:0 0 10px rgba(80,200,80,.4)}
.t.exsel{border-color:#ff6600;box-shadow:0 0 12px rgba(255,100,0,.5);transform:translateY(-12px)}
.t:not(.t-back):not(.dis):hover{transform:translateY(-4px)}
.t.sel:hover{transform:translateY(-14px)}
.t.dis{opacity:.85;cursor:default}

/* Game */
.game{height:100vh;height:100dvh;display:flex;flex-direction:column;background:#14505e;overflow:hidden}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:2px 6px;background:rgba(0,0,0,.3);flex-shrink:0;font-size:.7rem}
.topbar button{padding:2px 6px;background:rgba(255,255,255,.1);color:#dde;border:none;border-radius:3px;cursor:pointer;font-family:inherit;font-size:.7rem}
.gi{display:flex;gap:5px;align-items:center}
.rb{background:rgba(255,215,0,.2);color:#ffd700;padding:1px 4px;border-radius:3px;font-weight:600}

/* Table */
.tbl{flex:1 1 0;position:relative;background:radial-gradient(ellipse at center,#1a6878,#14505e);min-height:100px;overflow:hidden}

/* Opponent hands: along the EDGES, NOT in center */
.oh{position:absolute;display:flex;gap:1px}
.oh-top{top:3px;left:50%;transform:translateX(-50%)}
.oh-left{left:3px;top:50%;transform:translateY(-50%) rotate(90deg);transform-origin:center}
.oh-right{right:3px;top:50%;transform:translateY(-50%) rotate(-90deg);transform-origin:center}

/* Player info labels */
.plb{position:absolute;font-size:.58rem;background:rgba(0,0,0,.5);padding:1px 4px;border-radius:3px;display:flex;gap:2px;align-items:center;white-space:nowrap;z-index:5}
.plb .n{color:#eee}.plb .w{color:#ffd700}.plb .fl{color:#f8a0c0}
.db{background:#c03030;color:#fff;padding:0 2px;border-radius:2px;font-size:.45rem;font-weight:700}

/* Opponent melds: at bottom-left of their respective zone */
.om{position:absolute;display:flex;gap:2px;z-index:4;flex-wrap:wrap}
.om-top{top:28px;left:6px}
.om-left{bottom:6px;left:24px}
.om-right{bottom:6px;right:24px}
.meld{display:inline-flex;gap:1px;align-items:flex-end}

/* CENTER DISCARD AREA - 4 sections, NO overlap with edge tiles */
.ctr{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:grid;grid-template-areas:"d2 d2" "d3 d1" "d0 d0";grid-template-columns:1fr 1fr;grid-template-rows:auto auto auto;gap:4px;max-width:min(360px,75vw)}
.ctr .ds{display:flex;flex-wrap:wrap;gap:1px;padding:2px;min-height:36px;background:rgba(0,0,0,.06);border-radius:4px}
.ds-0{grid-area:d0;justify-content:center}
.ds-1{grid-area:d1;justify-content:flex-start}
.ds-2{grid-area:d2;justify-content:center}
.ds-3{grid-area:d3;justify-content:flex-end}
.ds-label{font-size:.5rem;color:rgba(255,255,255,.3);margin-bottom:1px;text-align:center}

/* Buttons */
.mb{text-align:center;padding:3px;background:rgba(0,0,0,.3);font-size:.8rem;color:#f0e8c0;min-height:1.4rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bb{display:flex;justify-content:center;gap:5px;padding:4px;background:rgba(0,0,0,.4);flex-shrink:0;flex-wrap:wrap}
.bw{padding:5px 12px;font-size:.92rem;font-weight:700;background:linear-gradient(135deg,#c03030,#991100);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit;animation:pu 1.5s infinite}
@keyframes pu{0%,100%{box-shadow:0 0 0 0 rgba(200,0,0,.4)}50%{box-shadow:0 0 0 8px rgba(200,0,0,0)}}
.ba{padding:5px 10px;font-size:.85rem;font-weight:600;background:rgba(255,215,0,.1);border:1.5px solid rgba(255,215,0,.35);color:#ffd700;border-radius:8px;cursor:pointer;font-family:inherit}
.bp{padding:5px 10px;font-size:.85rem;background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);border:none;border-radius:8px;cursor:pointer;font-family:inherit}
.bpr{padding:6px 18px;font-size:.92rem;font-weight:700;background:linear-gradient(135deg,#d4a843,#a07820);color:#1a0a00;border:none;border-radius:8px;cursor:pointer;font-family:inherit;margin:3px}
.bse{padding:5px 12px;font-size:.78rem;background:none;border:1px solid rgba(255,215,0,.2);color:rgba(255,255,255,.5);border-radius:8px;cursor:pointer;font-family:inherit;margin:3px}

/* Player area - MUST always be visible */
.pa{background:rgba(0,0,0,.4);padding:4px 3px;padding-bottom:max(4px,env(safe-area-inset-bottom,4px));flex-shrink:0;display:flex;align-items:flex-end;gap:4px;flex-wrap:wrap}
.pa-melds{display:flex;gap:3px;flex-wrap:wrap;align-items:flex-end;flex-shrink:0}
.pa-flowers{display:flex;gap:2px;flex-wrap:wrap;align-items:flex-end;flex-shrink:0;margin-left:auto}
.ph{display:flex;gap:2px;justify-content:center;flex:1;align-items:flex-end;min-height:50px;flex-wrap:wrap;min-width:0}
.ph .dgap{width:10px;flex-shrink:0}
.pi{display:flex;gap:4px;align-items:center;justify-content:center;font-size:.62rem;padding-top:1px;flex-shrink:0;width:100%}

/* Exchange */
.exi{background:rgba(255,100,0,.12);border:1px solid rgba(255,100,0,.25);border-radius:6px;padding:3px 8px;font-size:.76rem;color:#ffcc80;text-align:center;flex-shrink:0}
.exc{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-top:3px}
.exb{padding:4px 10px;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,215,0,.3);color:#f0e8c0;border-radius:6px;cursor:pointer;font-family:inherit;font-size:.78rem}
.exb:hover{background:rgba(255,215,0,.15);border-color:#ffd700}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100}
.md2{background:linear-gradient(145deg,#2a4a2a,#1a3a1a);border:1px solid rgba(255,215,0,.2);border-radius:14px;padding:1.4rem;max-width:320px;width:86vw;text-align:center}
.md2 h2{font-size:1.3rem;color:#ffd700;margin-bottom:.3rem}
.ft2{font-size:2.2rem;font-weight:900;color:#ffd700;margin:.2rem 0}
.fb{text-align:left;margin:.4rem 0;max-height:150px;overflow-y:auto}
.fi{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:.76rem}
.fv{color:#ffd700;font-weight:600}

.dov{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:90;flex-direction:column;gap:1rem}
.dbo{font-size:5rem;animation:dr .6s ease-out}
@keyframes dr{0%{transform:rotate(0) scale(.5);opacity:0}50%{transform:rotate(360deg) scale(1.2)}100%{transform:rotate(720deg) scale(1)}}
.dms{font-size:1rem;color:#f0e8c0;text-align:center;max-width:280px;line-height:1.5}
.ms{height:100vh;height:100dvh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 40% 30%,#1a6878,#14505e);flex-direction:column;gap:1rem}
.ms h1{font-size:2.2rem;color:#ffd700;letter-spacing:.08em;text-shadow:0 2px 8px rgba(0,0,0,.4)}
.ms .sub{color:rgba(255,255,255,.4);font-size:.75rem;letter-spacing:.15em}
/* Phone portrait (small, e.g. iPhone SE) */
@media(max-width:380px){
  .t-lg{width:28px;height:38px;border-width:1px;border-radius:3px}
  .t-md{width:20px;height:28px}.t-sm{width:14px;height:20px}.t-xs{width:9px;height:13px}
  .ph{gap:1px;min-height:40px}.ph .dgap{width:5px}
  .pa{padding:2px 1px}
  .topbar{font-size:.58rem;padding:1px 3px}
  .plb{font-size:.45rem}.mb{font-size:.62rem;padding:1px;min-height:1rem}
  .bb{gap:2px;padding:2px}.bw{padding:3px 6px;font-size:.7rem}.ba,.bp{padding:3px 5px;font-size:.65rem}
  .ctr{max-width:70vw}.ctr .ds{min-height:22px;padding:1px}
  .ms h1{font-size:1.5rem}.dbo{font-size:3rem}
  .md2{padding:.8rem;max-width:260px}.ft2{font-size:1.6rem}.fi{font-size:.62rem}
  .exi{font-size:.6rem;padding:2px 4px}.exb{font-size:.62rem;padding:2px 5px}
  .bpr{padding:4px 10px;font-size:.72rem}.bse{padding:3px 6px;font-size:.62rem}
  .oh-left,.oh-right{display:none}/* hide side hands on tiny screens */
}
/* Phone portrait (medium, e.g. iPhone 12-15) */
@media(min-width:381px) and (max-width:430px){
  .t-lg{width:32px;height:44px;border-width:1.5px}
  .t-md{width:22px;height:30px}.t-sm{width:16px;height:22px}.t-xs{width:10px;height:14px}
  .ph{gap:1px;min-height:46px}.ph .dgap{width:6px}
  .ctr{max-width:72vw}.ctr .ds{min-height:24px}
  .ms h1{font-size:1.6rem}
  .mb{font-size:.68rem;min-height:1.1rem}.bw{font-size:.78rem}.ba,.bp{font-size:.72rem}
  .bpr{padding:5px 12px;font-size:.78rem}
}
/* Large phone / phone landscape */
@media(min-width:431px) and (max-width:767px){
  .t-lg{width:36px;height:50px}
  .t-md{width:26px;height:36px}.t-sm{width:18px;height:25px}.t-xs{width:11px;height:15px}
  .ph{gap:2px;min-height:52px}
  .ctr{max-width:68vw}
}
/* iPad portrait */
@media(min-width:768px) and (max-width:1024px) and (orientation:portrait){
  .t-lg{width:44px;height:60px}
  .t-md{width:30px;height:42px}.t-sm{width:22px;height:30px}.t-xs{width:14px;height:19px}
  .ph{gap:2px;min-height:64px}.ph .dgap{width:10px}
  .ctr{max-width:60vw}
  .topbar{font-size:.78rem;padding:3px 8px}
  .plb{font-size:.6rem}
  .mb{font-size:.85rem;padding:3px}
  .bb{gap:6px;padding:5px}.bw{padding:6px 14px;font-size:.95rem}.ba,.bp{padding:6px 12px;font-size:.88rem}
  .ms h1{font-size:2.4rem}.dbo{font-size:5rem}
  .md2{max-width:360px;padding:1.5rem}.ft2{font-size:2.4rem}
  .bpr{padding:7px 20px;font-size:.95rem}
  .exi{font-size:.82rem;padding:4px 10px}.exb{font-size:.85rem;padding:5px 12px}
  .pa{padding:5px 4px}
}
/* iPad landscape */
@media(min-width:1025px) and (max-width:1400px){
  .t-lg{width:50px;height:68px}
  .t-md{width:34px;height:47px}.t-sm{width:26px;height:36px}.t-xs{width:16px;height:22px}
  .ph{gap:3px;min-height:72px}.ph .dgap{width:12px}
  .ctr{max-width:450px}
  .topbar{font-size:.82rem;padding:3px 10px}
  .ms h1{font-size:2.8rem}
  .pa{padding:6px 5px}
}
/* Large desktop */
@media(min-width:1401px){
  .t-lg{width:56px;height:78px}
  .t-md{width:40px;height:55px}.t-sm{width:30px;height:42px}.t-xs{width:18px;height:25px}
  .ph{gap:4px;min-height:82px}.ph .dgap{width:14px}
  .ctr{max-width:520px}
  .ms h1{font-size:3.2rem}
  .pa{padding:8px 6px}
}
/* Safe area for notched phones */
@supports(padding-top:env(safe-area-inset-top)){
  .topbar{padding-top:max(2px,env(safe-area-inset-top))}
  .pa{padding-bottom:max(3px,env(safe-area-inset-bottom))}
}
/* Landscape on short screens */
@media(max-height:420px){
  .t-lg{width:30px;height:42px;border-width:1px}
  .t-md{width:20px;height:28px}.t-sm{width:14px;height:20px}.t-xs{width:9px;height:13px}
  .ph{gap:1px;min-height:44px}.ph .dgap{width:5px}
  .topbar{padding:1px 3px;font-size:.58rem}
  .mb{font-size:.58rem;min-height:.9rem;padding:1px}
  .bb{padding:2px;gap:2px}.bw{padding:2px 5px;font-size:.65rem}.ba,.bp{padding:2px 4px;font-size:.6rem}
  .pa{padding:2px 1px}
  .plb{font-size:.42rem}
  .ctr{max-width:50vw}
  .exi{font-size:.55rem;padding:1px 3px}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
var RD='#c83030',GN='#2a8844',BL='#336699';
function drawTile(cv,t,w,h){cv.width=w*2;cv.height=h*2;var c=cv.getContext('2d');c.scale(2,2);c.fillStyle='#f5f0e0';c.fillRect(0,0,w,h);if(!t){c.fillStyle='#4a9abd';c.fillRect(0,0,w,h);c.strokeStyle='#6ac0e0';c.lineWidth=1;c.strokeRect(w*.12,h*.1,w*.76,h*.8);return}if(t.suit==='tong')dTo(c,t.value,w,h);else if(t.suit==='sok')dSo(c,t.value,w,h);else if(t.suit==='wan')dWa(c,t.value,w,h);else if(t.suit==='wind')dWi(c,t.value,w,h);else if(t.suit==='dragon')dDr(c,t.value,w,h);else if(t.suit==='flower')dFl(c,t.value,w,h)}
function dCi(c,x,y,r,co){c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.fillStyle=co;c.fill();c.beginPath();c.arc(x,y,r*.65,0,Math.PI*2);c.fillStyle='#f5f0e0';c.fill();c.beginPath();c.arc(x,y,r*.45,0,Math.PI*2);c.fillStyle=co;c.fill();c.beginPath();c.arc(x,y,r*.25,0,Math.PI*2);c.fillStyle='#f5f0e0';c.fill()}
function dTo(c,n,w,h){var r=Math.min(w,h)*.095,cx=w/2,cy=h/2,L={1:[[cx,cy]],2:[[cx,cy-r*1.6],[cx,cy+r*1.6]],3:[[cx,cy-r*2.3],[cx,cy],[cx,cy+r*2.3]],4:[[cx-r*1.3,cy-r*1.3],[cx+r*1.3,cy-r*1.3],[cx-r*1.3,cy+r*1.3],[cx+r*1.3,cy+r*1.3]],5:[[cx-r*1.3,cy-r*1.5],[cx+r*1.3,cy-r*1.5],[cx,cy],[cx-r*1.3,cy+r*1.5],[cx+r*1.3,cy+r*1.5]],6:[[cx-r*1.3,cy-r*2],[cx+r*1.3,cy-r*2],[cx-r*1.3,cy],[cx+r*1.3,cy],[cx-r*1.3,cy+r*2],[cx+r*1.3,cy+r*2]],7:[[cx-r*1.3,cy-r*2.2],[cx+r*1.3,cy-r*2.2],[cx-r*1.3,cy],[cx+r*1.3,cy],[cx-r*1.3,cy+r*2.2],[cx+r*1.3,cy+r*2.2],[cx,cy-r*1.1]],8:[[cx-r*1.3,cy-r*2.4],[cx+r*1.3,cy-r*2.4],[cx-r*1.3,cy-r*.8],[cx+r*1.3,cy-r*.8],[cx-r*1.3,cy+r*.8],[cx+r*1.3,cy+r*.8],[cx-r*1.3,cy+r*2.4],[cx+r*1.3,cy+r*2.4]],9:[[cx-r*1.4,cy-r*2.3],[cx,cy-r*2.3],[cx+r*1.4,cy-r*2.3],[cx-r*1.4,cy],[cx,cy],[cx+r*1.4,cy],[cx-r*1.4,cy+r*2.3],[cx,cy+r*2.3],[cx+r*1.4,cy+r*2.3]]},rr=n===1?r*1.8:n<=4?r*1.1:r*.85,pts=L[n]||L[1];for(var i=0;i<pts.length;i++){var isR=(n>=2&&n<=3&&i===0)||(n>=4&&(i===0||i===3));dCi(c,pts[i][0],pts[i][1],rr,isR?RD:GN)}}
function dSt(c,x,y,ht,sw,co){c.fillStyle=co;c.beginPath();c.roundRect(x-sw/2,y-ht,sw,ht*2,sw*.4);c.fill();c.fillStyle=co===RD?'#a02020':'#1a6633';for(var dy of[-.3,0,.3]){var yy=y+ht*dy;c.beginPath();c.moveTo(x,yy-sw*.4);c.lineTo(x+sw*.5,yy);c.lineTo(x,yy+sw*.4);c.lineTo(x-sw*.5,yy);c.closePath();c.fill()}}
function dSo(c,n,w,h){var cx=w/2,cy=h/2,sw=Math.min(w,h)*.075,sH=Math.min(w,h)*.12;if(n===1){c.fillStyle=GN;c.beginPath();c.ellipse(cx,cy-sH,sw*2.5,sw*2,0,0,Math.PI*2);c.fill();c.beginPath();c.roundRect(cx-sw*.9,cy,sw*1.8,sH*2.5,sw*.4);c.fill();c.fillStyle=RD;c.beginPath();c.moveTo(cx+sw*2.5,cy-sH);c.lineTo(cx+sw*4,cy-sH*1.3);c.lineTo(cx+sw*2.5,cy-sH*.5);c.closePath();c.fill();return}var ht=sH*1.1,L={2:[[cx,cy-ht*1.15],[cx,cy+ht*1.15]],3:[[cx-sw*2,cy],[cx,cy-ht*.6],[cx+sw*2,cy]],4:[[cx-sw*1.4,cy-ht],[cx+sw*1.4,cy-ht],[cx-sw*1.4,cy+ht],[cx+sw*1.4,cy+ht]],5:[[cx-sw*1.4,cy-ht*1.15],[cx+sw*1.4,cy-ht*1.15],[cx,cy],[cx-sw*1.4,cy+ht*1.15],[cx+sw*1.4,cy+ht*1.15]],6:[[cx-sw*1.4,cy-ht*1.4],[cx+sw*1.4,cy-ht*1.4],[cx-sw*1.4,cy],[cx+sw*1.4,cy],[cx-sw*1.4,cy+ht*1.4],[cx+sw*1.4,cy+ht*1.4]],7:[[cx-sw*1.4,cy-ht*1.5],[cx+sw*1.4,cy-ht*1.5],[cx-sw*1.4,cy],[cx+sw*1.4,cy],[cx-sw*1.4,cy+ht*1.5],[cx+sw*1.4,cy+ht*1.5],[cx,cy-ht*.75]],8:[[cx-sw*1.4,cy-ht*1.6],[cx+sw*1.4,cy-ht*1.6],[cx-sw*1.4,cy-ht*.55],[cx+sw*1.4,cy-ht*.55],[cx-sw*1.4,cy+ht*.55],[cx+sw*1.4,cy+ht*.55],[cx-sw*1.4,cy+ht*1.6],[cx+sw*1.4,cy+ht*1.6]],9:[[cx-sw*1.8,cy-ht*1.6],[cx,cy-ht*1.6],[cx+sw*1.8,cy-ht*1.6],[cx-sw*1.8,cy],[cx,cy],[cx+sw*1.8,cy],[cx-sw*1.8,cy+ht*1.6],[cx,cy+ht*1.6],[cx+sw*1.8,cy+ht*1.6]]},pts=L[n]||[];for(var i=0;i<pts.length;i++)dSt(c,pts[i][0],pts[i][1],ht*.55,sw,i===0?RD:GN)}
function dTx(c,t,x,y,sz,co){c.fillStyle=co;c.font='900 '+sz+'px "Noto Sans TC",serif';c.textAlign='center';c.textBaseline='middle';c.fillText(t,x,y)}
function dWa(c,n,w,h){var W=['','一','二','三','四','五','六','七','八','九'],s=Math.min(w,h);dTx(c,W[n],w/2,h*.38,s*.4,RD);dTx(c,'萬',w/2,h*.72,s*.26,RD)}
function dWi(c,v,w,h){dTx(c,['','東','南','西','北'][v],w/2,h/2,Math.min(w,h)*.52,BL)}
function dDr(c,v,w,h){if(v===1)dTx(c,'中',w/2,h/2,Math.min(w,h)*.58,RD);else if(v===2)dTx(c,'發',w/2,h/2,Math.min(w,h)*.58,GN);else{c.strokeStyle=BL;c.lineWidth=2.5;c.strokeRect(w*.18,h*.18,w*.64,h*.64);c.strokeRect(w*.25,h*.25,w*.5,h*.5)}}
function dFl(c,v,w,h){var nm=['','梅','蘭','菊','竹','春','夏','秋','冬'],cl=['','#c04466','#6644aa','#c08800','#228844','#c02200','#2266aa','#c06600','#4466aa'];dTx(c,v+'',w*.16,h*.13,Math.min(w,h)*.14,cl[v]);dTx(c,nm[v],w/2,h/2,Math.min(w,h)*.44,cl[v])}

var WN=["","東","南","西","北"],SN={wan:"萬",tong:"筒",sok:"索"},PN=["你","下家","對家","上家"];
function CD(){var d=[],id=0;["wan","tong","sok"].forEach(function(s){for(var v=1;v<=9;v++)for(var c=0;c<4;c++)d.push({id:id++,suit:s,value:v,key:s+"-"+v})});for(var v=1;v<=4;v++)for(var c=0;c<4;c++)d.push({id:id++,suit:"wind",value:v,key:"wind-"+v});for(var v=1;v<=3;v++)for(var c=0;c<4;c++)d.push({id:id++,suit:"dragon",value:v,key:"dragon-"+v});for(var v=1;v<=8;v++)d.push({id:id++,suit:"flower",value:v,key:"flower-"+v});return d}
function shuf(a){var r=[...a];for(var i=r.length-1;i>0;i--){var j=0|Math.random()*(i+1);var tmp=r[i];r[i]=r[j];r[j]=tmp}return r}
function isN(s){return s==="wan"||s==="tong"||s==="sok"}
function srt(t){var o={wan:0,tong:1,sok:2,wind:3,dragon:4,flower:5};return[...t].sort(function(a,b){return o[a.suit]!==o[b.suit]?o[a.suit]-o[b.suit]:a.value-b.value})}
function lb(t){if(t.suit==="flower")return["","梅","蘭","菊","竹","春","夏","秋","冬"][t.value];if(t.suit==="wind")return WN[t.value];if(t.suit==="dragon")return["","中","發","白"][t.value];return t.value+SN[t.suit]}
function cn(t){var c={};for(var x of t)c[x.key]=(c[x.key]||0)+1;return c}
function cW(ht){if(ht.length%3!==2)return false;return dec(cn(ht),ht.length,false)}
function dec(c,rem,hp){if(rem===0)return hp;var fk=null;for(var k in c)if(c[k]>0){fk=k;break}if(!fk)return false;var p=fk.split("-"),s=p[0],v=+p[1];if(!hp&&c[fk]>=2){c[fk]-=2;if(dec(c,rem-2,true)){c[fk]+=2;return true}c[fk]+=2}if(c[fk]>=3){c[fk]-=3;if(dec(c,rem-3,hp)){c[fk]+=3;return true}c[fk]+=3}if(isN(s)&&v<=7){var k2=s+"-"+(v+1),k3=s+"-"+(v+2);if((c[k2]||0)>=1&&(c[k3]||0)>=1){c[fk]--;c[k2]--;c[k3]--;if(dec(c,rem-3,hp)){c[fk]++;c[k2]++;c[k3]++;return true}c[fk]++;c[k2]++;c[k3]++}}return false}
function cF(at,ml,fl,wm,sw){var t=0,l=[];var hh=at.some(function(x){return x.suit==="wind"||x.suit==="dragon"}),nf=fl.length===0;if(nf){t++;l.push({n:"無花",f:1})}for(var f of fl){if(((f.value-1)%4)===(sw-1)){t+=2;l.push({n:"正花",f:2})}else{t++;l.push({n:"爛花",f:1})}}if(!hh&&nf){t+=10;l.push({n:"無字花大平糊",f:10})}else if(!hh){t+=5;l.push({n:"無字花",f:5})}var wp=ml.filter(function(m){return m.tiles[0].suit==="wind"&&m.type!=="chow"});for(var w of wp){if(w.tiles[0].value===sw){t+=2;l.push({n:"正風",f:2})}else{t++;l.push({n:"爛風",f:1})}}var dp=ml.filter(function(m){return m.tiles[0].suit==="dragon"&&m.type!=="chow"});for(var d of dp){t+=2;l.push({n:"碰"+["","中","發","白"][d.tiles[0].value],f:2})}if(wp.length>=3){var x=wp.length===4?80:30;t+=x;l.push({n:wp.length===4?"大四喜":"大三風",f:x})}if(dp.length===3){t+=40;l.push({n:"大三元",f:40})}if(wm==="self_draw"){t++;l.push({n:"自摸",f:1})}var su=new Set(at.filter(function(x){return isN(x.suit)}).map(function(x){return x.suit}));if(su.size===2){t+=5;l.push({n:"缺一門",f:5})}if(su.size===1&&hh){t+=30;l.push({n:"混一色",f:30})}if(su.size===1&&!hh&&su.size>0){t+=80;l.push({n:"清一色",f:80})}if(at.every(function(x){return x.suit==="wind"||x.suit==="dragon"})){t+=120;l.push({n:"字一色",f:120})}if(ml.filter(function(m){return m.type==="pung"||m.type==="kong"}).length===5){t+=30;l.push({n:"對對糊",f:30})}if(ml.every(function(m){return m.concealed})){t+=3;l.push({n:"門清",f:3})}return{tf:t,fl:l}}
function aiD(h){var c=cn(h),wi=0,ws=1/0;for(var i=0;i<h.length;i++){var t=h[i],s=(c[t.key]-1)*4;if(isN(t.suit))for(var d=-2;d<=2;d++){if(d!==0&&c[t.suit+"-"+(t.value+d)])s+=2}else{s+=(c[t.key]-1)*3;if(t.suit==="dragon")s+=2}if(s<ws){ws=s;wi=i}}return wi}
function aiSE(h,n){var s=h.map(function(t,i){return{i:i,sc:0,t:t}});var c=cn(h);s.forEach(function(x){x.sc=(c[x.t.key]-1)*4;if(isN(x.t.suit))for(var d=-2;d<=2;d++){if(d!==0&&c[x.t.suit+"-"+(x.t.value+d)])x.sc+=2}else x.sc+=(c[x.t.key]-1)*3});s.sort(function(a,b){return a.sc-b.sc});return s.slice(0,n).map(function(x){return x.i})}

// STATE
var G={phase:"menu",deck:[],di:0,hands:[[],[],[],[]],melds:[[],[],[],[]],flowers:[[],[],[],[]],disc:[[],[],[],[]],ct:0,dlr:0,rw:1,sel:-1,drId:-1,msg:"",claim:null,sd:null,jp:0,aiT:null,dv:0,ec:0,es:[],exStep:0,_ag:null,_pg:null};
function tl(){return G.deck.length-G.di-14}

// PROPER TURN FLOW:
// 1. Player draws tile (added to hand, shown separated)
// 2. Player may declare self-draw win or concealed kong
// 3. Player MUST discard exactly one tile
// 4. After discard: check claims (win > kong > pung > chow) from other players
// 5. If no claims, next player draws

function startG(){
  var dk=shuf(CD()),hs=[[],[],[],[]],fl=[[],[],[],[]],idx=0;
  for(var r=0;r<4;r++)for(var p=0;p<4;p++)for(var i=0;i<4;i++)hs[p].push(dk[idx++]);
  // Dealer gets 17th tile
  hs[G.dlr].push(dk[idx++]);
  // Replace flowers
  for(var p=0;p<4;p++){var hf=true;while(hf){hf=false;var nh=[];for(var t of hs[p]){if(t.suit==="flower"){fl[p].push(t);if(idx<dk.length)nh.push(dk[idx++]);hf=true}else nh.push(t)}hs[p]=nh}}
  G.deck=dk;G.di=idx;
  for(var p=0;p<4;p++){G.hands[p]=srt(hs[p]);G.melds[p]=[];G.flowers[p]=fl[p];G.disc[p]=[]}
  G.ct=G.dlr;G.sel=-1;G.drId=-1;G.claim=null;G.sd=null;
  G.dv=1+Math.floor(Math.random()*6);G.ec=G.dv<=3?3:G.dv;G.es=[];G.exStep=0;G._ag=null;G._pg=null;
  G.phase="dice";G.msg="";R()}

function startExch(){G.phase="ex_give";G.es=[];G.msg="選擇 "+G.ec+" 張牌送出";R()}
function confirmGive(){
  var gv=[],ix=[...G.es].sort(function(a,b){return b-a});
  for(var i of ix){gv.push(G.hands[0][i]);G.hands[0].splice(i,1)}
  G._ag=[null,[],[],[]];
  for(var ai=1;ai<=3;ai++){var sel=aiSE(G.hands[ai],G.ec),ix2=[...sel].sort(function(a,b){return b-a});for(var i of ix2){G._ag[ai].push(G.hands[ai][i]);G.hands[ai].splice(i,1)}G.hands[ai]=srt(G.hands[ai])}
  G._pg=gv;G.hands[0]=srt(G.hands[0]);G.es=[];G.exStep=0;G.phase="ex_pick";G.msg="第 1/"+G.ec+" 張：從誰拿？";R()}
function pickFrom(dir){
  var pool=G._ag[dir];if(!pool||!pool.length)return;
  G.hands[0].push(pool.shift());G.hands[0]=srt(G.hands[0]);G.exStep++;
  if(G.exStep>=G.ec){
    var all=[...G._pg];for(var ai=1;ai<=3;ai++)for(var t of(G._ag[ai]||[]))all.push(t);
    var sh2=shuf(all),si=0;for(var ai=1;ai<=3;ai++){for(var j=0;j<G.ec&&si<sh2.length;j++)G.hands[ai].push(sh2[si++]);G.hands[ai]=srt(G.hands[ai])}
    G._ag=null;G._pg=null;
    // Dealer already has 17 tiles, others have 16. Dealer discards first (no draw).
    if(G.dlr===0){G.phase="player_discard";G.msg="交換完成！你是莊家，請出牌。";G.drId=-1}
    else{G.msg="交換完成！"+PN[G.dlr]+"是莊家";G.phase="ai_turn";G.ct=G.dlr;schedAI_discard()}
    R()}else{G.msg="第 "+(G.exStep+1)+"/"+G.ec+" 張：從誰拿？";R()}}

function drawF(p){while(G.di<G.deck.length-14){var t=G.deck[G.di++];if(t.suit==="flower"){G.flowers[p].push(t)}else return t}return null}

// Player draws a tile at start of turn
function pDraw(){
  var t=drawF(0);if(!t){doFlow();return}
  G.drId=t.id;
  // DON'T sort - add to end so it appears separated
  G.hands[0]=[...G.hands[0],t];
  G.msg="你摸了 "+lb(t);G.phase="player_discard";G.sel=-1;R()}

function doFlow(){G.msg="流局！";G.jp+=10;G.phase="game_over";G.sd=null;R()}

// AI turn: draw then discard
function aiTurn(ai){
  var t=drawF(ai);if(!t){doFlow();return}
  var hand=[...G.hands[ai],t];
  // Check win
  if(cW(hand)){var at=[...hand];for(var m of G.melds[ai])at.push.apply(at,m.tiles);var sw=((ai+G.dlr)%4)+1;var r=cF(at,G.melds[ai],G.flowers[ai],"self_draw",sw);G.hands[ai]=srt(hand);G.sd={p:ai,tf:r.tf,fl:r.fl,m:"self_draw"};G.msg=PN[ai]+"自摸！"+r.tf+"番";G.phase="game_over";R();return}
  // Check kong
  var cc=cn(hand);for(var k in cc){if(cc[k]===4){var kt=hand.filter(function(x){return x.key===k});hand=hand.filter(function(x){return x.key!==k});G.melds[ai].push({type:"kong",tiles:kt,concealed:true});G.hands[ai]=srt(hand);G.msg=PN[ai]+"暗槓！";var t2=drawF(ai);if(!t2){doFlow();return}hand=[...G.hands[ai],t2];if(cW(hand)){var at=[...hand];for(var m of G.melds[ai])at.push.apply(at,m.tiles);var sw=((ai+G.dlr)%4)+1;var r=cF(at,G.melds[ai],G.flowers[ai],"self_draw",sw);G.hands[ai]=srt(hand);G.sd={p:ai,tf:r.tf,fl:r.fl,m:"self_draw"};G.msg=PN[ai]+"自摸！";G.phase="game_over";R();return}break}}

  var di=aiD(hand);var d=hand.splice(di,1)[0];G.hands[ai]=srt(hand);G.disc[ai].push(d);G.msg=PN[ai]+" 打 "+lb(d);
  afterDiscard(d,ai)}

// After ANY player discards, check claims from all OTHER players
function afterDiscard(tile,fp){
  // Check player claims (if not the discarder)
  var pC=fp!==0?gCO(0,tile,fp):[];
  // Check AI wins
  for(var ai=1;ai<=3;ai++){if(ai===fp)continue;if(cW([...G.hands[ai],tile])){if(pC.indexOf("win")<0){G.hands[ai]=srt([...G.hands[ai],tile]);G.disc[fp].pop();var at=[...G.hands[ai]];for(var m of G.melds[ai])at.push.apply(at,m.tiles);var sw=((ai+G.dlr)%4)+1;var r=cF(at,G.melds[ai],G.flowers[ai],"discard_win",sw);G.sd={p:ai,tf:r.tf,fl:r.fl,m:"discard_win"};G.msg=PN[ai]+"食糊！"+r.tf+"番";G.phase="game_over";R();return}}}
  // Player gets to claim first
  if(pC.length>0){G.claim={tile:tile,from:fp,options:pC};G.phase="claim";G.msg=PN[fp]+" 打了 "+lb(tile);R();return}
  // AI claims
  for(var ai=1;ai<=3;ai++){if(ai===fp)continue;var c=cn(G.hands[ai]),k=tile.key;
    // Kong
    if((c[k]||0)>=3){var mt=[tile],f=0,rm=[];for(var x of G.hands[ai]){if(x.key===k&&f<3){mt.push(x);f++}else rm.push(x)}G.melds[ai].push({type:"kong",tiles:mt,concealed:false});G.hands[ai]=srt(rm);G.disc[fp].pop();G.msg=PN[ai]+"槓！";setTimeout(mkAiAfterMeld(ai,true),500);R();return}
    // Pung
    if((c[k]||0)>=2){var ch=.5;if(tile.suit==="dragon"||tile.suit==="wind")ch=.85;if(Math.random()<ch){var mt=[tile],f=0,rm=[];for(var x of G.hands[ai]){if(x.key===k&&f<2){mt.push(x);f++}else rm.push(x)}G.melds[ai].push({type:"pung",tiles:mt,concealed:false});G.hands[ai]=srt(rm);G.disc[fp].pop();G.msg=PN[ai]+"碰！";setTimeout(mkAiAfterMeld(ai,false),500);R();return}}
    // Chow
    var us=(ai-1+4)%4;if(fp===us&&isN(tile.suit)){var v=tile.value,s=tile.suit,cc2=cn(G.hands[ai]);var combos=[];if(v>=3&&(cc2[s+"-"+(v-2)]||0)>=1&&(cc2[s+"-"+(v-1)]||0)>=1)combos.push([v-2,v-1,v]);if(v>=2&&v<=8&&(cc2[s+"-"+(v-1)]||0)>=1&&(cc2[s+"-"+(v+1)]||0)>=1)combos.push([v-1,v,v+1]);if(v<=7&&(cc2[s+"-"+(v+1)]||0)>=1&&(cc2[s+"-"+(v+2)]||0)>=1)combos.push([v,v+1,v+2]);
    if(combos.length&&Math.random()<.35){for(var combo of combos){var need=combo.filter(function(cv){return cv!==v}),th=[...G.hands[ai]],fd=[],ok=true;for(var nv of need){var idx=th.findIndex(function(x){return x.suit===s&&x.value===nv});if(idx===-1){ok=false;break}fd.push(th.splice(idx,1)[0])}if(ok){G.hands[ai]=srt(th);G.melds[ai].push({type:"chow",tiles:srt([tile].concat(fd)),concealed:false});G.disc[fp].pop();G.msg=PN[ai]+"上！";setTimeout(mkAiAfterMeld(ai,false),500);R();return}}}}}
  // No claims - next player draws
  nextTurn(fp)}

function mkAiAfterMeld(ai,isKong){return function(){
  if(isKong){// draw replacement tile after kong
    var t=drawF(ai);if(!t){doFlow();return}var hand=[...G.hands[ai],t];
    if(cW(hand)){var at=[...hand];for(var m of G.melds[ai])at.push.apply(at,m.tiles);var sw=((ai+G.dlr)%4)+1;var r=cF(at,G.melds[ai],G.flowers[ai],"self_draw",sw);G.hands[ai]=srt(hand);G.sd={p:ai,tf:r.tf,fl:r.fl,m:"self_draw"};G.msg=PN[ai]+"自摸！";G.phase="game_over";R();return}
    var di=aiD(hand);var d=hand.splice(di,1)[0];G.hands[ai]=srt(hand);G.disc[ai].push(d);afterDiscard(d,ai)}
  else{// discard after pung/chow
    var h2=G.hands[ai],di=aiD(h2),d=h2.splice(di,1)[0];G.hands[ai]=srt(h2);G.disc[ai].push(d);afterDiscard(d,ai)}}}

function nextTurn(fp){
  G.claim=null;var nx=(fp+1)%4;G.ct=nx;
  if(nx===0){pDraw()}
  else{G.phase="ai_turn";schedAI()}}

// AI scheduler - just runs aiTurn for current player
function schedAI(){clearTimeout(G.aiT);G.aiT=setTimeout(function(){if(G.phase!=="ai_turn")return;aiTurn(G.ct)},500)}
// For dealer's first turn (after exchange), dealer discards without drawing
function schedAI_discard(){clearTimeout(G.aiT);G.aiT=setTimeout(function(){
  var ai=G.ct;var h=G.hands[ai];
  // Dealer has 17 tiles, must discard one
  if(cW(h)){var at=[...h];for(var m of G.melds[ai])at.push.apply(at,m.tiles);var sw=((ai+G.dlr)%4)+1;var r=cF(at,G.melds[ai],G.flowers[ai],"self_draw",sw);G.sd={p:ai,tf:r.tf,fl:r.fl,m:"self_draw"};G.msg=PN[ai]+"自摸！";G.phase="game_over";R();return}
  var di=aiD(h);var d=h.splice(di,1)[0];G.hands[ai]=srt(h);G.disc[ai].push(d);G.msg=PN[ai]+" 打 "+lb(d);afterDiscard(d,ai)},500)}

function gCO(p,tile,fp){if(fp===p)return[];var h=G.hands[p],c=cn(h),k=tile.key,o=[];if(cW([...h,tile]))o.push("win");if((c[k]||0)>=3)o.push("kong");if((c[k]||0)>=2)o.push("pung");var us=(p-1+4)%4;if(fp===us&&isN(tile.suit)){var v=tile.value,s=tile.suit;if((v>=3&&(c[s+"-"+(v-2)]||0)>=1&&(c[s+"-"+(v-1)]||0)>=1)||(v>=2&&v<=8&&(c[s+"-"+(v-1)]||0)>=1&&(c[s+"-"+(v+1)]||0)>=1)||(v<=7&&(c[s+"-"+(v+1)]||0)>=1&&(c[s+"-"+(v+2)]||0)>=1))o.push("chow")}return o}

function doC(act){var tile=G.claim.tile,from=G.claim.from;
  if(act==="pass"){G.claim=null;// AI might still claim
    for(var ai=1;ai<=3;ai++){if(ai===from)continue;var c=cn(G.hands[ai]),k=tile.key;if((c[k]||0)>=2&&Math.random()<.4){var mt=[tile],f=0,rm=[];for(var x of G.hands[ai]){if(x.key===k&&f<2){mt.push(x);f++}else rm.push(x)}G.melds[ai].push({type:"pung",tiles:mt,concealed:false});G.hands[ai]=srt(rm);G.disc[from].pop();G.msg=PN[ai]+"碰！";setTimeout(mkAiAfterMeld(ai,false),500);R();return}}nextTurn(from);return}

  if(act==="pung"){var mt=[tile],f=0,rm=[];for(var t of G.hands[0]){if(t.key===tile.key&&f<2){mt.push(t);f++}else rm.push(t)}G.hands[0]=srt(rm);G.melds[0].push({type:"pung",tiles:mt,concealed:false});G.disc[from].pop();G.claim=null;G.ct=0;G.phase="player_discard";G.msg="碰！請出牌。";G.sel=-1;G.drId=-1;R();return}
  if(act==="kong"){var mt=[tile],f=0,rm=[];for(var t of G.hands[0]){if(t.key===tile.key&&f<3){mt.push(t);f++}else rm.push(t)}G.hands[0]=srt(rm);G.melds[0].push({type:"kong",tiles:mt,concealed:false});G.disc[from].pop();G.claim=null;pDraw();return}
  if(act==="chow"){var v=tile.value,s=tile.suit,combos=[];if(v>=3)combos.push([v-2,v-1,v]);if(v>=2&&v<=8)combos.push([v-1,v,v+1]);if(v<=7)combos.push([v,v+1,v+2]);for(var combo of combos){var need=combo.filter(function(cv){return cv!==v}),th=[...G.hands[0]],fd=[],ok=true;for(var nv of need){var idx=th.findIndex(function(t2){return t2.suit===s&&t2.value===nv});if(idx===-1){ok=false;break}fd.push(th.splice(idx,1)[0])}if(ok){G.hands[0]=srt(th);G.melds[0].push({type:"chow",tiles:srt([tile].concat(fd)),concealed:false});G.disc[from].pop();G.claim=null;G.ct=0;G.phase="player_discard";G.msg="上！請出牌。";G.sel=-1;G.drId=-1;R();return}}}}

function tC(idx){
  if(G.phase==="ex_give"){var si=G.es.indexOf(idx);if(si>=0)G.es.splice(si,1);else if(G.es.length<G.ec)G.es.push(idx);R();return}
  if(G.phase!=="player_discard")return;
  if(G.sel===idx){// Discard selected tile
    var tile=G.hands[0][idx];G.hands[0].splice(idx,1);G.hands[0]=srt(G.hands[0]);G.disc[0].push(tile);G.drId=-1;G.sel=-1;
    afterDiscard(tile,0);R()}
  else{G.sel=idx;R()}}

function sD(){if(cW(G.hands[0])){var at=[...G.hands[0]];for(var m of G.melds[0])at.push.apply(at,m.tiles);var r=cF(at,G.melds[0],G.flowers[0],"self_draw",1);G.sd={p:0,tf:r.tf,fl:r.fl,m:"self_draw"};G.msg="你自摸！"+r.tf+"番！";G.phase="game_over";R()}}
